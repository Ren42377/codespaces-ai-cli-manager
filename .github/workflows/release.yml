name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run package
      - run: cp codespaces-ai-cli-manager-*.vsix codespaces-ai-cli-manager.vsix

      - uses: softprops/action-gh-release@v2
        with:
          files: codespaces-ai-cli-manager.vsix
          generate_release_notes: true
